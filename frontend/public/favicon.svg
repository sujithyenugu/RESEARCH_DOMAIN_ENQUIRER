<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0a0e1a" stroke="url(#grad)" stroke-width="2"/>
  <!-- Microscope/research icon stylized as "R" with a dot -->
  <text x="32" y="44" font-family="system-ui,sans-serif" font-size="32" font-weight="800"
        text-anchor="middle" fill="url(#grad)">R</text>
  <!-- Small accent dot -->
  <circle cx="46" cy="20" r="4" fill="#10b981"/>
</svg>
